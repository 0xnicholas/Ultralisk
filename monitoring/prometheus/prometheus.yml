# Prometheus 抓取配置(模块二)
#
# 关键:vLLM/TGI 自带引擎级指标(TTFT/TPOT/吞吐),网关/应用层指标单独暴露。
# 三个抓取源合起来才是全链路视图。
global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  # 1) FastAPI 应用/网关中间层指标(鉴权失败、限流拒绝、审核命中、token 用量)
  - job_name: ultralisk-app
    static_configs:
      - targets: ["app:8000"]
    metrics_path: /metrics

  # 2) Kong 网关指标(prometheus 插件)
  - job_name: kong
    static_configs:
      - targets: ["kong:8001"]
    metrics_path: /metrics

  # 3) 推理引擎指标(vLLM/TGI 原生 /metrics —— TTFT/TPOT/吞吐/显存)
  - job_name: inference-engine
    static_configs:
      - targets: ["vllm:8000"]   # 接入真实引擎后启用
    metrics_path: /metrics
