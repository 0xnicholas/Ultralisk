# 告警规则(模块二验收:错误率高、显存高、TTFT 异常升高)
groups:
  - name: ultralisk-slo
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(ultralisk_requests_total{status="error"}[5m]))
            / clamp_min(sum(rate(ultralisk_requests_total[5m])), 1) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "错误率 > 5%(持续 5m)"

      - alert: HighQuotaRejections
        expr: sum(rate(ultralisk_requests_rejected_total{reason=~"quota_.*"}[5m])) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "配额拒绝频繁,可能需要扩容或调整分级配额"

      # 以下依赖真实推理引擎/GPU exporter 指标(接入后启用)
      - alert: GPUMemoryHigh
        expr: vllm_gpu_memory_usage_ratio > 0.9
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "GPU 显存占用 > 90%"

      - alert: TTFTDegraded
        expr: histogram_quantile(0.95, sum(rate(vllm:time_to_first_token_seconds_bucket[5m])) by (le)) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "TTFT P95 > 2s,首 token 延迟异常升高"
