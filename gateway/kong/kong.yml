# Kong 声明式配置(DB-less 模式)
#
# 对应 AGENTS.md 模块一:鉴权 + QPS 限流,放在网关层,与推理逻辑解耦。
# - key-auth: 无 key / 错误 key 拒绝(401)
# - rate-limiting: 滑动窗口,超限返回 429 + Retry-After
#
# 注意(见 docs/tech-stack.md):token 用量配额网关做不了,由 FastAPI 应用回写,
# 这里只负责 QPS 限流与鉴权。校验通过后 Kong 会注入 X-Consumer-* header 给上游。
#
# 启动:kong 以 KONG_DATABASE=off + KONG_DECLARATIVE_CONFIG=/kong/kong.yml 运行。

_format_version: "3.0"

services:
  - name: ultralisk-api
    url: http://app:8000        # 上游 FastAPI 应用(docker-compose service 名)
    routes:
      - name: chat-completions
        paths:
          - /v1/chat/completions
        strip_path: false
    plugins:
      # 鉴权:校验 apikey(header 或 query),失败 401
      - name: key-auth
        config:
          key_names: ["apikey"]
          hide_credentials: true
      # QPS 限流:滑动窗口,超限 429 + Retry-After
      - name: rate-limiting
        config:
          minute: 600           # 分级配额可用 consumer 级插件覆盖
          policy: redis         # 计数落 Redis,多网关实例共享
          redis:
            host: redis
            port: 6379
          limit_by: consumer
          error_code: 429
          error_message: "Rate limit exceeded"
      # 暴露 Prometheus 指标(网关层:鉴权失败/限流拒绝,引擎抓不到的部分)
      - name: prometheus
        config:
          status_code_metrics: true
          latency_metrics: true

# 调用方 + Key(生产应通过 Admin API 动态增删;此处示例两个分级 consumer)
consumers:
  - username: tier-free
    keyauth_credentials:
      - key: demo-free-key-CHANGE-ME
  - username: tier-pro
    keyauth_credentials:
      - key: demo-pro-key-CHANGE-ME

# 分级限流:pro 更高 QPS(覆盖 service 级默认)
plugins:
  - name: rate-limiting
    consumer: tier-pro
    config:
      minute: 6000
      policy: redis
      redis:
        host: redis
        port: 6379
      limit_by: consumer
