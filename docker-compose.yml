# 一键起完整基础设施:Kong 网关 + Redis + PG + FastAPI 应用 + Prometheus + Grafana + Alertmanager
# 推理引擎(vLLM/TGI)为可选,接入后取消注释即可,基础设施层不依赖它先跑通。
version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ultralisk
      POSTGRES_PASSWORD: ultralisk
      POSTGRES_DB: ultralisk
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      # 启动时自动建表(月度配额持久化)
      - ./sql/monthly_usage.sql:/docker-entrypoint-initdb.d/01-monthly_usage.sql:ro

  app:
    build: .
    environment:
      INFERENCE_BACKEND: mock          # 接入真实引擎后改为 vllm/tgi
      QUOTA_STORE: redis_pg            # 日 Redis + 月 PG 写穿
      REDIS_URL: redis://redis:6379/0
      PG_DSN: postgresql://ultralisk:ultralisk@postgres:5432/ultralisk
      LOG_LEVEL: INFO
    expose: ["8000"]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_start

  kong:
    image: kong:3.6
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./gateway/kong/kong.yml:/kong/kong.yml:ro
    ports:
      - "8080:8000"   # 对外代理入口(用户请求打这里)
      - "8001:8001"   # Admin API
    depends_on:
      - app
      - redis

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
    ports: ["9090:9090"]

  alertmanager:
    image: prom/alertmanager:latest
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports: ["9093:9093"]

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports: ["3000:3000"]
    depends_on:
      - prometheus

  # 推理引擎(接入真实模型时启用)
  # vllm:
  #   image: vllm/vllm-openai:latest
  #   command: ["--model", "Qwen/Qwen2.5-7B-Instruct", "--port", "8000"]
  #   ports: ["8000:8000"]
  #   deploy:
  #     resources:
  #       reservations:
  #         devices: [{ capabilities: ["gpu"] }]

volumes:
  pgdata:
